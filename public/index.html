<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>autobrowse — train a skill for a frozen agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<style>
:root{
  --bg:#F9F6F4; --panel:#fff; --panel2:#faf8f6; --line:#e6e2de; --line2:#efe9e4;
  --ink:#100D0D; --gray:#514F4F; --faint:#8a807a;
  --primary:#F03603; --blue:#3f7fae; --green:#5a8a1a; --greenbg:#eaf3da; --purple:#7c4dd1; --red:#c2402a; --redbg:#fbe9e3;
  --mono:'GT Standard Mono','Geist Mono',ui-monospace,monospace;
  --font-display:'GT Planar','Hanken Grotesk',system-ui,sans-serif;
  --font-body:'GT Standard','Inter',system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-body);background:var(--bg);color:var(--ink);height:100vh;overflow:hidden;display:flex;font-size:15px}
/* ── sidebar ── */
.side{width:250px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden}
body.side-collapsed .side{display:none}
#sidetoggle{display:none;align-items:center;justify-content:center;position:fixed;top:14px;left:14px;z-index:60;width:38px;height:38px;border-radius:9px;border:1px solid var(--line);background:var(--panel);color:var(--gray);font-size:16px;cursor:pointer}
body.side-collapsed #sidetoggle{display:flex}
.sidehide{margin-left:auto;border:0;background:none;color:var(--faint);font-size:20px;line-height:1;cursor:pointer;padding:0 2px}
.sidehide:hover{color:var(--ink)}
.brand{padding:18px 18px 14px;display:flex;align-items:center;gap:9px;font-family:var(--font-display);font-weight:800;font-size:19px;letter-spacing:-.02em}
.brand .logo{width:26px;height:26px;border-radius:6px;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;line-height:1;flex-shrink:0}
.brand .slash{color:var(--faint);font-weight:400;font-size:20px}
.newbtn{margin:0 14px 14px;height:38px;border:1px solid var(--line);background:var(--panel2);border-radius:8px;font:inherit;font-size:13px;font-weight:600;cursor:pointer}
.newbtn:hover{border-color:var(--primary);color:var(--primary)}
.side h4{font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);padding:6px 18px}
.runs{flex:1;overflow-y:auto;padding:0 10px 18px}
.run{padding:10px 12px;border-radius:9px;cursor:pointer;margin-bottom:4px;border:1px solid transparent}
.run:hover{background:var(--panel2)}.run.sel{background:var(--panel2);border-color:var(--line)}
.run .nm{font-size:13.5px;font-weight:600;display:flex;align-items:center;gap:7px}
.run .pr{font-size:12px;color:var(--gray);margin-top:4px;line-height:1.35;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.run .meta{font-family:var(--mono);font-size:10.5px;color:var(--faint);margin-top:5px}
.dot{width:9px;height:9px;min-width:9px;max-width:9px;min-height:9px;max-height:9px;border-radius:50%;flex:0 0 9px;align-self:center;display:inline-block}
.dot.pass{background:var(--green)}.dot.fail{background:var(--primary)}.dot.run{background:var(--blue)}.dot.idle{background:var(--faint)}
/* ── main ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.bar{padding:13px 22px;border-bottom:1px solid var(--line);background:var(--panel);display:flex;gap:12px;align-items:center}
.bar input{flex:1;height:42px;border:1px solid var(--line);border-radius:9px;padding:0 14px;font:inherit;font-size:14px;background:var(--bg)}
.bar input:focus{outline:none;border-color:var(--primary)}
.go{height:42px;padding:0 22px;background:var(--primary);color:#fff;border:none;border-radius:9px;font:inherit;font-weight:600;cursor:pointer}
.go:hover{background:#ff4a1a}.go:disabled{opacity:.5}
.ctrls{display:flex;gap:7px;align-items:center;font-family:var(--mono);font-size:11px;color:var(--faint)}
.ctrls select{font-family:var(--mono);font-size:12px;border:1px solid var(--line);border-radius:7px;padding:6px;background:var(--panel2);color:var(--gray)}
/* run header */
.runhead{padding:14px 22px;border-bottom:1px solid var(--line);background:var(--panel2);display:flex;align-items:center;gap:14px}
body.side-collapsed .runhead{padding-left:66px}
.runhead .pr{flex:1;font-size:15px;font-weight:600;line-height:1.35}
.runhead .st{font-family:var(--mono);font-size:12px;display:flex;align-items:center;gap:7px;white-space:nowrap}
.runhead .rep{font-family:var(--mono);font-size:11px;color:var(--purple);background:#f1ebfb;border:1px solid #e0d3f5;padding:3px 9px;border-radius:6px}
.runhead .rh-models{font-family:var(--mono);font-size:11px;color:var(--faint);white-space:nowrap}
/* tabs */
.tabs{display:flex;gap:4px;padding:10px 22px 0;border-bottom:1px solid var(--line);background:var(--panel)}
.tab{padding:9px 16px;font-size:13.5px;font-weight:600;color:var(--gray);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab:hover{color:var(--ink)}
.tab.on{color:var(--primary);border-bottom-color:var(--primary)}
.tabwrap{flex:1;overflow:hidden;position:relative}
.pane{position:absolute;inset:0;overflow:auto;padding:20px 22px;display:none}
.pane.on{display:block}
/* iterations pane */
.itergrid{display:grid;grid-template-columns:230px 1fr;gap:20px;height:100%}
.iterlist{overflow-y:auto;display:flex;flex-direction:column;gap:8px}
.iter{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:11px 12px;cursor:pointer;transition:border-color .12s,background .12s}
.iter:hover{border-color:#d8d2cc}
.iter.sel{border-color:var(--primary);background:#fdf2ec}
.iter .top{display:flex;align-items:center;gap:8px}
.iter .t{font-size:14px;font-weight:700}.iter .st{margin-left:auto;font-family:var(--mono);font-size:11px}
.iter .st.pass{color:var(--green)}.iter .st.fail{color:var(--primary)}.iter .st.run{color:var(--blue)}
.iter .nums{font-family:var(--mono);font-size:11px;color:var(--gray);margin-top:6px}
.detail{display:flex;flex-direction:column;gap:14px;overflow-y:auto}
.browser{position:relative;background:#15110f;width:100%;max-width:960px;margin:0 auto;aspect-ratio:16/9;border:1px solid var(--line);border-radius:12px;overflow:hidden;color:#8a807a;font-family:var(--mono);font-size:12px;text-align:center}
.browser iframe{position:absolute;inset:0;width:100%;height:100%;border:0;background:#000}
.browser video{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:#000;display:block}
.bmode{font-family:var(--mono);font-size:11px;color:var(--gray);margin-bottom:-6px}
.learn{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px 20px}
.learn>summary.lab{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--purple);cursor:pointer;list-style:none}
.learn>summary.lab::-webkit-details-marker{display:none}
.learn[open]>summary.lab{margin-bottom:8px}
.learn .hyp{font-size:16px;line-height:1.5;font-weight:500}
.learn .study{font-size:13.5px;color:var(--gray);margin-top:9px;line-height:1.5}
.learn .add{font-family:var(--mono);font-size:12px;color:var(--green);background:var(--greenbg);border-radius:5px;padding:5px 9px;margin-top:6px;display:block}
.innerbox{background:var(--panel);border:1px solid var(--line);border-radius:12px}
.innerbox summary{font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);padding:11px 14px;cursor:pointer}
.innerfeed{max-height:200px;overflow-y:auto;padding:0 14px 12px}
.think-line{font-size:13px;color:var(--ink);padding:6px 0;line-height:1.45;border-bottom:1px solid var(--line2)}
.action{display:flex;gap:10px;padding:5px 0;font-size:12.5px;border-bottom:1px solid var(--line2)}
.action .v{font-family:var(--mono);font-size:11px;color:var(--primary);min-width:58px;font-weight:600}
.action .d{color:var(--gray);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* improvements pane */
.charts{display:grid;grid-template-columns:1fr 1fr;gap:24px;max-width:1100px}
.chartcard{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px 20px}
.chartcard h5{font-size:13px;font-weight:700;margin-bottom:4px}
.chartcard .delta{font-family:var(--mono);font-size:12px;color:var(--green);margin-bottom:8px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;max-width:1100px}
.statcard{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 18px}
.statcard .k{font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--faint)}
.statcard .v{font-family:var(--font-display);font-size:27px;font-weight:800;margin-top:8px;letter-spacing:-.02em;white-space:nowrap}
.statcard .v.pass{color:var(--green)} .statcard .v.fail{color:var(--red)}
/* skill pane */
.skillwrap{max-width:840px;margin:0 auto}
.md{padding:22px 26px;max-height:64vh;overflow:auto;line-height:1.6;font-size:15px}
.fm{background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:12px 14px;margin-bottom:18px}
.fm-name{font-family:var(--mono);font-size:13px;color:var(--primary)}
.fm-desc{font-size:14px;color:var(--gray);margin-top:5px;line-height:1.5}
.md h1{font-family:var(--font-display);font-size:23px;font-weight:800;margin:4px 0 12px;letter-spacing:-.01em}
.md h2{font-family:var(--font-display);font-size:18px;font-weight:700;margin:22px 0 8px}
.md h3{font-size:14px;font-weight:700;margin:16px 0 6px}
.md p{margin:0 0 10px;color:var(--gray)}
.md ul,.md ol{margin:0 0 12px 22px;color:var(--gray)} .md li{margin:3px 0}
.md code{font-family:var(--mono);font-size:13px;background:#f1ece6;padding:2px 6px;border-radius:4px;color:var(--ink)}
.md pre{background:#15110f;color:#e8e6e3;border-radius:8px;padding:14px 16px;overflow:auto;margin:0 0 12px}
.md pre code{background:none;color:inherit;padding:0}
.md hr{border:none;border-top:1px solid var(--line);margin:18px 0}
.md strong{color:var(--ink);font-weight:700} .md a{color:var(--primary)}
.promptcard{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 18px;margin-bottom:18px}
.promptcard .lab{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);margin-bottom:6px}
.promptcard .v{font-size:16px;line-height:1.4}
.skillbox{background:var(--panel);border:1px solid var(--line);border-radius:12px}
.skillbox .hd{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--line)}
.skillbox h4{font-size:14px;font-weight:700}
.copy{border:1px solid var(--line);background:var(--panel2);border-radius:7px;padding:6px 12px;font:inherit;font-size:12px;cursor:pointer}
.copy:hover{border-color:var(--primary);color:var(--primary)}
.skillbox pre{padding:16px 18px;font-family:var(--mono);font-size:12px;line-height:1.6;white-space:pre-wrap;color:var(--gray);max-height:60vh;overflow:auto}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--faint);text-align:center;gap:12px}
.empty .big{font-family:var(--font-display);font-size:26px;font-weight:800;letter-spacing:-.02em;color:var(--ink)}
.empty .sm{font-size:15px;max-width:46ch;line-height:1.5}
/* ── start screen ── */
.start{flex:1;display:flex;align-items:center;justify-content:center;padding:40px}
.start-inner{width:100%;max-width:760px;text-align:center}
.start-kick{font-family:var(--mono);font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);margin-bottom:14px}
.start-h{font-family:var(--font-display);font-size:38px;font-weight:800;letter-spacing:-.02em;margin-bottom:30px}
.start-box{display:flex;gap:12px;margin-bottom:18px}
.start-box input{flex:1;height:54px;border:1px solid var(--line);border-radius:11px;padding:0 18px;font:inherit;font-size:15px;background:var(--panel)}
.start-box input:focus{outline:none;border-color:var(--primary)}
.start .go{height:54px;padding:0 28px;border-radius:11px;font-size:15px}
.start .ctrls{justify-content:center}
/* ── browser window frame ── */
.browserwin{width:100%;max-width:960px;margin:0 auto;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#15110f}
.chrome{display:flex;gap:7px;align-items:center;padding:9px 14px;background:#211c19;border-bottom:1px solid #2c2622}
.chrome span{width:11px;height:11px;border-radius:50%;background:#3a332e;flex:0 0 11px}
.chrome span:nth-child(1){background:#ff5f57}.chrome span:nth-child(2){background:#febc2e}.chrome span:nth-child(3){background:#28c840}
</style>
</head>
<body class="side-collapsed">
<button id="sidetoggle" title="Show runs">☰</button>
<div class="side">
  <div class="brand"><span class="logo">B</span><span class="slash">/</span><span>autobrowse</span><button class="sidehide" id="sidehide" title="Hide sidebar">‹</button></div>
  <button class="newbtn" id="new">+ New run</button>
  <h4>Runs</h4>
  <div class="runs" id="runs"></div>
</div>

<div class="main">
  <div id="start" class="start">
    <div class="start-inner">
      <h2 class="start-h">What would you like to autobrowse?</h2>
      <div class="start-box">
        <input id="prompt" placeholder="go to flights.google.com and find the cheapest SFO→JFK nonstop, sorted by price" />
        <button class="go" id="go">Run ▸</button>
      </div>
      <div class="ctrls"><span>doer</span><select id="innerModel"></select><span>teacher</span><select id="outerModel"></select></div>
    </div>
  </div>

  <div id="stage" style="flex:1;display:none;flex-direction:column;overflow:hidden">
    <div class="runhead">
      <div class="pr" id="rh-prompt">—</div>
      <span class="rh-models" id="rh-models"></span>
      <div class="st" id="rh-status"></div>
      <span id="rh-rep"></span>
    </div>
    <div class="tabs">
      <div class="tab on" data-tab="iterations">Iterations</div>
      <div class="tab" data-tab="improvements">Improvements</div>
      <div class="tab" data-tab="skill">Skill</div>
    </div>
    <div class="tabwrap">
      <!-- ITERATIONS -->
      <div class="pane on" id="pane-iterations">
        <div class="itergrid">
          <div class="iterlist" id="iters"></div>
          <div class="detail">
            <div class="bmode" id="bmode">—</div>
            <div class="browser" id="browser">browser appears here</div>
            <details class="learn"><summary class="lab">what it learned this iteration</summary><div class="hyp" id="hyp">—</div><div class="study" id="study"></div><div id="adds"></div></details>
            <details class="innerbox"><summary>Doer agent</summary><div class="innerfeed" id="inner"></div></details>
          </div>
        </div>
      </div>
      <!-- IMPROVEMENTS -->
      <div class="pane" id="pane-improvements">
        <div class="stats" id="stats"></div>
        <div class="charts" id="charts"></div>
      </div>
      <!-- SKILL -->
      <div class="pane" id="pane-skill">
        <div class="skillwrap">
          <div class="promptcard"><div class="lab">prompt</div><div class="v" id="sk-prompt">—</div></div>
          <div class="skillbox"><div class="hd"><h4 id="sk-title">SKILL.md</h4><button class="copy" id="copy">Copy</button></div><div class="md" id="skillmd">training… the skill graduates when a run passes.</div></div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
const $ = id => document.getElementById(id);
let R=null, es=null, curBrowser=null, userPinned=false, HIST=[];

fetch('/api/env').then(r=>r.json()).then(e=>{
  const models=e.models||['claude-haiku-4-5-20251001','claude-sonnet-4-6'];
  for(const m of models){ $('innerModel').add(new Option(short(m),m)); $('outerModel').add(new Option(short(m),m)); }
  const op=models.find(m=>/opus/.test(m))||models[models.length-1]; $('innerModel').value=op; $('outerModel').value=op;
}).catch(()=>{});
function short(m){return (m||'').replace('claude-','').replace('-20251001','');}
function cleanLearn(s){ if(!s) return ''; let t=String(s); const i=t.search(/<\/?parameter\b/i); if(i>=0) t=t.slice(0,i); return t.replace(/<\/?[a-z][^>]*>/gi,'').trim(); }
function fmtDate(ts){ if(!ts)return''; const d=new Date(ts); return d.toLocaleDateString(undefined,{month:'short',day:'numeric'})+' '+d.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'}); }
function esc(s){return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

loadHistory().then(()=>{ const u=new URLSearchParams(location.search), rid=u.get('run'); if(rid && (HIST||[]).some(m=>m.id===rid)) replay(rid).then(()=>{ const t=u.get('tab'); if(t) setTab(t); }); });
$('new').onclick=()=>{ if(es)es.close(); R=null; $('stage').style.display='none'; $('start').style.display='flex'; document.body.classList.add('side-collapsed'); document.querySelectorAll('.run').forEach(r=>r.classList.remove('sel')); $('prompt').value=''; $('prompt').focus(); };
$('sidetoggle').onclick=()=>document.body.classList.remove('side-collapsed');
$('sidehide').onclick=()=>document.body.classList.add('side-collapsed');
$('go').onclick=startRun;
$('prompt').addEventListener('keydown',e=>{ if(e.key==='Enter') startRun(); });
$('copy').onclick=()=>{ if(!R||!R.skill)return; navigator.clipboard.writeText(R.skill); $('copy').textContent='Copied ✓'; setTimeout(()=>$('copy').textContent='Copy',1500); };
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>setTab(t.dataset.tab));

function setTab(tab){
  if(!R) return; R.tab=tab; curBrowser=null;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.tab===tab));
  document.querySelectorAll('.pane').forEach(p=>p.classList.toggle('on',p.id==='pane-'+tab));
  render();
}

async function loadHistory(){
  let list=[]; try{ list=await(await fetch('/api/history')).json(); }catch{} HIST=list;
  $('runs').innerHTML = list.length?'':'<div style="padding:10px 12px;color:var(--faint);font-size:13px">No runs yet — train one →</div>';
  for(const m of list){
    const st = (m.status==='graduated'||m.status==='done')?(m.passed?'pass':'fail'):(m.status==='running'?'run':'idle');
    const el=document.createElement('div'); el.className='run'; el.dataset.id=m.id;
    el.innerHTML=`<div class="nm">${esc(m.skillName||m.site||'run')}</div>
      <div class="pr">${esc(m.prompt||'')}</div>
      <div class="meta">${m.innerModel?short(m.innerModel):''} · ${fmtDate(m.startedAt)}</div>`;
    el.onclick=()=>replay(m.id);
    $('runs').appendChild(el);
  }
}

async function startRun(){
  const prompt=$('prompt').value.trim(); if(!prompt) return;
  if(es) es.close(); reset(false); R.prompt=prompt; R.models={inner:$('innerModel').value,outer:$('outerModel').value};
  $('go').disabled=true; $('go').textContent='Running…';
  renderHead();
  const {runId}=await(await fetch('/api/runs',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({prompt,innerModel:$('innerModel').value,outerModel:$('outerModel').value})})).json();
  R.id=runId; loadHistory().then(()=>document.querySelectorAll('.run').forEach(r=>r.classList.toggle('sel',r.dataset.id===runId)));
  es=new EventSource(`/api/runs/${runId}/stream`); es.onmessage=m=>{ apply(JSON.parse(m.data)); render(); };
}
async function replay(id){
  if(es) es.close(); reset(true); const meta=(HIST||[]).find(x=>x.id===id)||{}; R.models={inner:meta.innerModel,outer:meta.outerModel};
  document.querySelectorAll('.run').forEach(r=>r.classList.toggle('sel',r.dataset.id===id));
  let events=[]; try{ events=await(await fetch(`/api/runs/${id}/events`)).json(); }catch{}
  for(const ev of events) apply(ev);
  if(R.order.length) R.selected=R.order[0];
  render();
}
function reset(isReplay){
  R={prompt:'',models:{},status:'running',iters:{},order:[],selected:null,skill:null,graduated:false,passed:false,replay:isReplay,tab:'iterations'};
  curBrowser=null; userPinned=false;
  $('start').style.display='none'; $('stage').style.display='flex';
  setTab('iterations');
}

function apply(ev){
  const it = ev.iter!=null ? (R.iters[ev.iter] ||= {iter:ev.iter,status:'run',inner:[],added:[]}) : null;
  switch(ev.type){
    case 'run-started': R.prompt=ev.prompt; if(ev.models&&(ev.models.inner||ev.models.outer))R.models=ev.models; break;
    case 'iteration-started': if(!R.order.includes(ev.iter)) R.order.push(ev.iter); if(ev.final&&it) it.final=true; if(!userPinned) R.selected=ev.iter; break;
    case 'session': if(it){ it.liveUrl=ev.liveViewUrl||null; it.sessionId=ev.sessionId||null; } break;
    case 'inner-action': if(it){ const d=String(ev.detail||'').trim(); if(ev.action!=='ok'&&d) it.inner.push(ev); } break;
    case 'metrics': if(it){ it.turns=ev.turns; it.cost=ev.cost; it.latency=ev.latency; } break;
    case 'outer-reasoning': if(it){ if(ev.phase==='hypothesis') it.hypothesis=ev.text; else if(ev.text&&!/^reading|^graduating/i.test(ev.text)) it.study=ev.text; } break;
    case 'strategy-updated': if(it) it.added=ev.added||[]; break;
    case 'judged': if(it){ it.status=ev.pass?'pass':'fail'; it.verdict=ev.verdict; } break;
    case 'graduated': R.graduated=true; R.skill=ev.skill; R.skillName=ev.skillName; R.passed=ev.passed; R.status='done'; if(!R.replay) loadHistory(); break;
    case 'run-finished': R.status='done'; $('go').disabled=false; $('go').textContent='Run ▸'; break;
    case 'run-error': R.status='error'; $('go').disabled=false; $('go').textContent='Run ▸'; break;
  }
}

function renderHead(){
  $('rh-prompt').textContent = R.prompt || '—';
  const running = R.status==='running' && !R.replay;
  const st = R.passed?'pass':(R.status==='error'?'fail':running?'run':'idle');
  $('rh-status').innerHTML = `${R.passed?'passed':running?'training…':R.status==='error'?'error':'done'}`;
  $('rh-rep').innerHTML = '';
  const im=R.models&&R.models.inner, om=R.models&&R.models.outer, rm=$('rh-models');
  if(rm) rm.textContent = (im||om)?('doer '+short(im||'?')+'  ·  teacher '+short(om||'?')):'';
}

function render(){
  if(!R) return;
  renderHead();
  if(R.tab==='iterations') renderIterations();
  else if(R.tab==='improvements') renderImprovements();
  else if(R.tab==='skill') renderSkill();
}

function renderIterations(){
  $('iters').innerHTML='';
  for(const n of R.order){
    const it=R.iters[n]; const d=document.createElement('div'); d.className='iter'+(R.selected===n?' sel':'');
    d.innerHTML=`<div class="top"><span class="t">${it.final?'★ Final · graduated skill':'Iteration '+n}</span>
      <span class="st ${it.status}">${it.status==='pass'?'✓ pass':it.status==='fail'?'✗ fail':'…'}</span></div>
      <div class="nums">${it.turns!=null?it.turns+' turns':''}${it.cost!=null?' · $'+it.cost:''}${it.latency!=null?' · '+it.latency+'s':''}</div>`;
    d.onclick=()=>{ R.selected=n; userPinned=true; curBrowser=null; render(); };
    $('iters').appendChild(d);
  }
  const it = R.selected!=null?R.iters[R.selected]:null;
  if(!it){ $('bmode').textContent='—'; return; }
  const isLive = it.status==='run' && it.liveUrl && !R.replay;
  const canReplay = !isLive && it.sessionId;
  $('bmode').innerHTML = `Iteration ${it.iter} · ` + (isLive?'<span style="color:var(--blue)">● live</span>':canReplay?'<span style="color:var(--purple)">▷ recording</span>':'session ended');
  const bkey = it.iter+'|'+(isLive?'live:'+it.liveUrl:canReplay?'hls:'+it.sessionId:'none');
  if(bkey!==curBrowser){ curBrowser=bkey; killHls(); // always tear down the previous player before swapping the pane
    if(isLive){ $('browser').style.aspectRatio='16 / 9'; $('browser').innerHTML=`<iframe src="${it.liveUrl}"></iframe>`; }
    else if(canReplay){ $('browser').innerHTML=`<video id="vid" controls autoplay muted loop playsinline></video>`; mountHls(it.sessionId); }
    else { $('browser').style.aspectRatio='16 / 9'; $('browser').innerHTML=`<div style="height:100%;display:flex;align-items:center;justify-content:center">iteration ${it.iter} · session ended</div>`; }
  }
  $('hyp').textContent = cleanLearn(it.hypothesis) || (it.status==='run'?'thinking…':'—');
  $('study').textContent = cleanLearn(it.study);
  $('adds').innerHTML = (it.added||[]).map(a=>`<span class="add">+ ${esc(a)}</span>`).join('');
  $('inner').innerHTML = it.inner.map(a=> a.action==='think'
    ? `<div class="think-line">${esc(a.detail)}</div>`
    : `<div class="action"><span class="v">${esc(a.action)}</span><span class="d">${esc(a.detail||'')}</span></div>`).join('');
  $('inner').scrollTop=1e9;
}

function renderImprovements(){
  const its=R.order.map(n=>R.iters[n]).filter(it=>it.turns!=null);
  if(its.length<1){ $('stats').innerHTML=''; $('charts').innerHTML='<div style="color:var(--faint)">metrics appear as iterations complete…</div>'; return; }
  const first=its[0],last=its[its.length-1];
  $('stats').innerHTML =
    statCard('iterations', its.length) +
    statCard('turns', `${first.turns} → ${last.turns}`) +
    statCard('cost', `$${first.cost} → $${last.cost}`) +
    statCard('outcome', last.status==='pass'?'✓ pass':'✗ fail', last.status);
  const turns=its.map(it=>({iter:it.iter,v:it.turns,pass:it.status==='pass'}));
  const cost=its.map(it=>({iter:it.iter,v:it.cost,pass:it.status==='pass'}));
  const lat=its.map(it=>({iter:it.iter,v:it.latency,pass:it.status==='pass'}));
  const d=(a)=>{const f=a[0].v,l=a[a.length-1].v; return (f&&l&&l<f)?(f/l).toFixed(1)+'× better':''; };
  $('charts').innerHTML=
    chartCard('Turns per iteration', turns, '#d4805e', v=>v, d(turns)) +
    chartCard('Cost per iteration', cost, '#d4805e', v=>'$'+v, d(cost)) +
    chartCard('Latency per iteration', lat, '#d4805e', v=>v+'s', d(lat)) +
    chartCard('Outcome', turns.map(t=>({...t,v:t.pass?1:0})), '#d8cfc8', v=>v?'pass':'fail', '', '#c2402a');
}
function statCard(k,v,cls){ return `<div class="statcard"><div class="k">${k}</div><div class="v ${cls||''}">${v}</div></div>`; }
function chartCard(title, series, color, fmt, delta, dotFail){
  return `<div class="chartcard"><h5>${title}</h5><div class="delta">${delta||'&nbsp;'}</div>${lineChart(series,color,fmt,dotFail)}</div>`;
}
function lineChart(series,color,fmt,dotFail){
  const W=480,H=196,padL=60,padR=26,padT=32,padB=38,n=series.length;
  const maxV=Math.max(...series.map(s=>s.v),1);
  const x0=padL,x1=W-padR,yB=H-padB,yT=padT;
  const x=i=> x0+(n<=1?(x1-x0)/2:(i/(n-1))*(x1-x0));
  const y=v=> yB-(v/maxV)*(yB-yT);
  // y gridlines + tick labels at 0 and max
  let grid='';
  [0,1].forEach(f=>{ const v=maxV*f, yy=y(v);
    grid+=`<line x1="${x0}" y1="${yy}" x2="${x1}" y2="${yy}" stroke="#efe9e2" stroke-width="1"/>`
        + `<text x="${x0-9}" y="${yy+4}" text-anchor="end" font-size="11" fill="#9a908a" font-family="ui-monospace">${fmt(v)}</text>`; });
  // axes
  const axes=`<line x1="${x0}" y1="${yT}" x2="${x0}" y2="${yB}" stroke="#cfc7be" stroke-width="1.5"/>`
           + `<line x1="${x0}" y1="${yB}" x2="${x1}" y2="${yB}" stroke="#cfc7be" stroke-width="1.5"/>`;
  const line = n>1 ? `<polyline points="${series.map((s,i)=>x(i)+','+y(s.v)).join(' ')}" fill="none" stroke="${color}" stroke-width="2.5"/>`:'';
  const dots = series.map((s,i)=>`<circle cx="${x(i)}" cy="${y(s.v)}" r="5" fill="${s.pass?'#5a8a1a':(dotFail||color)}"/><text x="${x(i)}" y="${y(s.v)-11}" text-anchor="middle" font-size="12.5" fill="#56504b" font-family="ui-monospace">${fmt(s.v)}</text>`).join('');
  const xl = series.map((s,i)=>`<text x="${x(i)}" y="${H-12}" text-anchor="middle" font-size="11" fill="#9a908a" font-family="ui-monospace">iter ${s.iter}</text>`).join('');
  return `<svg viewBox="0 0 ${W} ${H}" width="100%">${grid}${axes}${line}${dots}${xl}</svg>`;
}

function renderSkill(){
  $('sk-prompt').textContent = R.prompt||'—';
  const md=$('skillmd');
  if(R.graduated && R.skill){ $('sk-title').textContent='SKILL.md — graduated ✓'; md.innerHTML=renderMd(R.skill); }
  else { $('sk-title').textContent='SKILL.md'; md.innerHTML='<p style="color:var(--faint)">training… the skill graduates when a run passes.</p>'; }
}
function renderMd(src){
  let fm='',body=src;
  const m=src.match(/^---\n([\s\S]*?)\n---\n?([\s\S]*)$/);
  if(m){ fm=m[1]; body=m[2]; }
  let head='';
  if(fm){
    const name=(fm.match(/name:\s*(.*)/)||[])[1]||'';
    const desc=(fm.match(/description:\s*>?\s*([\s\S]*?)(?:\n\w+:|$)/)||[])[1]||'';
    head=`<div class="fm">${name?`<div class="fm-name">${esc(name.trim())}</div>`:''}${desc?`<div class="fm-desc">${esc(desc.replace(/\s+/g,' ').trim())}</div>`:''}</div>`;
  }
  const html = window.marked ? marked.parse(body) : '<pre>'+esc(body)+'</pre>';
  return head+html;
}

let curHls=null;
function killHls(){ if(curHls){ try{curHls.destroy();}catch{} curHls=null; } }
function mountHls(sid){
  const v=$('vid'); if(!v) return; const url='/api/replay/'+sid;
  killHls(); // tear down any previous iteration's player so we never stack instances on one <video>
  if(window.Hls && window.Hls.isSupported()){
    const h=new Hls({manifestLoadingMaxRetry:4, manifestLoadingRetryDelay:1500});
    curHls=h;
    let netTries=0;
    h.on(Hls.Events.ERROR,(_,d)=>{
      if(!d.fatal || curHls!==h || $('vid')!==v) return;
      if(d.type===Hls.ErrorTypes.NETWORK_ERROR && netTries++<8){
        // a just-finished recording can 404 for a few seconds while Browserbase finalizes it
        setTimeout(()=>{ if(curHls===h && $('vid')===v) h.loadSource(url); }, 2500);
      } else if(d.type===Hls.ErrorTypes.MEDIA_ERROR){
        h.recoverMediaError();
      } else { killHls(); }
    });
    h.loadSource(url); h.attachMedia(v);
  } else {
    v.src=url; // Safari: native HLS
  }
}
</script>
